<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HADAL V2 — Visual Systems Board</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Teko:wght@300;400;500;600;700&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap');

*{margin:0;padding:0;box-sizing:border-box}

:root{
--g:#DAFF4A;
--g2:#b8d840;
--g3:#8aad20;
--glo:rgba(218,255,74,.12);
--amb:#FF9814;
--amb2:#cc7a10;
--bg:#050700;
--bg2:#0a0d02;
--bg3:#0f1204;
--dim:rgba(218,255,74,.25);
--dim2:rgba(218,255,74,.08);
}

html{background:var(--bg);color:var(--g);font-family:'Share Tech Mono',monospace}
body{min-height:100vh;padding:0}

/* ═══ HEADER ═══ */
.board-header{
padding:24px 32px 20px;
border-bottom:2px solid rgba(218,255,74,.15);
display:flex;justify-content:space-between;align-items:flex-end;
background:linear-gradient(180deg,rgba(218,255,74,.03) 0%,transparent 100%);
}
.board-header h1{
font-family:'Teko',sans-serif;font-weight:700;font-size:42px;letter-spacing:6px;
line-height:1;text-transform:uppercase;color:var(--g);
}
.board-header .sub{
font-size:10px;letter-spacing:3px;color:var(--dim);
margin-top:2px;
}
.board-header .meta{
text-align:right;font-size:9px;letter-spacing:2px;color:var(--dim);
line-height:1.8;
}

/* ═══ GRID ═══ */
.board{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:3px;
padding:3px;
background:rgba(218,255,74,.04);
}

/* ═══ TILE CONTAINER ═══ */
.tile{
background:var(--bg);
position:relative;
overflow:hidden;
min-height:420px;
}
.tile.tall{min-height:520px}
.tile.wide{grid-column:span 2}

.tile-num{
position:absolute;top:8px;left:10px;z-index:20;
font-family:'Teko',sans-serif;font-weight:700;font-size:38px;
color:var(--g);line-height:1;letter-spacing:2px;
opacity:.9;
}
.tile-num::before{
content:'';display:block;width:100%;height:2px;
background:var(--g);margin-bottom:2px;opacity:.4;
}

.tile-label{
position:absolute;bottom:0;left:0;right:0;z-index:20;
padding:6px 10px;
background:rgba(5,7,0,.92);
border-top:1px solid rgba(218,255,74,.12);
font-size:8px;letter-spacing:3px;text-transform:uppercase;
color:var(--dim);
}

.tile-body{
position:absolute;inset:0;
display:flex;align-items:center;justify-content:center;
padding:50px 16px 30px;
}

/* ═══ CANVAS TILES ═══ */
.tile canvas{
position:absolute;inset:0;
width:100%;height:100%;
}

/* ═══ 01 LOCK GEOMETRY ═══ */
.lock-geo{position:relative;width:100%;height:100%}

/* ═══ 04 CIRCUIT ═══ */
.circuit-surface{
position:absolute;inset:0;
background:
repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(218,255,74,.015) 3px,rgba(218,255,74,.015) 4px),
repeating-linear-gradient(90deg,transparent,transparent 3px,rgba(218,255,74,.015) 3px,rgba(218,255,74,.015) 4px);
}

/* ═══ 05 CHIP ═══ */
.chip-surface{
width:100%;height:100%;position:relative;
background:
linear-gradient(135deg,rgba(218,255,74,.02) 25%,transparent 25%,transparent 75%,rgba(218,255,74,.02) 75%),
linear-gradient(45deg,rgba(218,255,74,.02) 25%,transparent 25%,transparent 75%,rgba(218,255,74,.02) 75%);
background-size:4px 4px;
}

/* ═══ 06 BINARY ═══ */
.binary-square{
font-family:'Share Tech Mono',monospace;
font-size:7px;line-height:8px;letter-spacing:1px;
color:var(--g);word-break:break-all;
overflow:hidden;
opacity:.85;
}

/* ═══ 08 GLYPHS ═══ */
.glyph-grid{
display:grid;grid-template-columns:repeat(4,1fr);
gap:8px;width:100%;
}
.glyph-cell{
aspect-ratio:1;
border:1px solid rgba(218,255,74,.15);
display:flex;align-items:center;justify-content:center;
font-size:28px;
position:relative;
background:rgba(218,255,74,.02);
}
.glyph-cell::after{
content:attr(data-id);
position:absolute;bottom:2px;right:3px;
font-size:6px;letter-spacing:1px;
font-family:'Share Tech Mono',monospace;
color:var(--dim);
}

/* ═══ 10 HEX ═══ */
.hex-field{position:relative;width:100%;height:100%;overflow:hidden}

/* ═══ 13 DIAGONAL ═══ */
.diag-bands{
position:absolute;inset:0;overflow:hidden;
transform:rotate(-12deg) scale(1.4);
transform-origin:center;
}
.diag-band{
height:28px;
display:flex;align-items:center;
padding:0 20px;
font-family:'Teko',sans-serif;
font-size:16px;letter-spacing:6px;
text-transform:uppercase;
white-space:nowrap;
overflow:hidden;
}
.diag-band:nth-child(odd){
background:var(--g);color:var(--bg);font-weight:700;
}
.diag-band:nth-child(even){
background:transparent;color:var(--g);font-weight:400;
border-top:1px solid rgba(218,255,74,.2);
border-bottom:1px solid rgba(218,255,74,.2);
}
.diag-band.amb{background:var(--amb);color:var(--bg)}
.diag-band.thin{height:6px;background:rgba(218,255,74,.15)}
.diag-band.thick{height:42px;font-size:22px}

/* ═══ 14 STRUCTURAL TYPE ═══ */
.struct-type{
position:absolute;inset:0;overflow:hidden;
display:flex;flex-direction:column;justify-content:center;
padding:10px;
}
.struct-type .mega{
font-family:'Teko',sans-serif;
font-weight:700;
font-size:120px;
line-height:.82;
letter-spacing:-2px;
color:var(--g);
text-transform:uppercase;
}
.struct-type .mega.outline{
-webkit-text-stroke:1.5px var(--g);
color:transparent;
}
.struct-type .micro{
font-family:'Share Tech Mono',monospace;
font-size:8px;letter-spacing:4px;
color:var(--dim);margin-top:4px;
}

/* ═══ 15 AMBER ═══ */
.amber-panel{
width:100%;height:100%;position:relative;
border:2px solid var(--amb);
background:rgba(255,152,20,.03);
}
.amber-panel .amber-header{
background:var(--amb);color:var(--bg);
padding:6px 12px;
font-family:'Teko',sans-serif;font-weight:700;
font-size:18px;letter-spacing:4px;
display:flex;justify-content:space-between;align-items:center;
}
.amber-panel .amber-body{padding:12px;color:var(--amb)}
.amber-flash{animation:ambflash 1.8s ease-in-out infinite}
@keyframes ambflash{0%,100%{opacity:1}50%{opacity:.4}}

/* ═══ 16 RASTER MICRO ═══ */
.micro-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
grid-template-rows:repeat(3,1fr);
gap:3px;
width:100%;height:100%;
}
.micro-mod{
background:var(--bg2);
border:1px solid rgba(218,255,74,.1);
position:relative;
overflow:hidden;
padding:4px;
}
.micro-mod canvas{width:100%;height:100%;display:block}
.micro-mod .micro-label{
position:absolute;top:2px;left:3px;
font-size:6px;letter-spacing:2px;color:var(--dim);
}

/* ═══ SCANLINES OVERLAY ═══ */
.scanlines{
position:absolute;inset:0;pointer-events:none;z-index:10;
background:repeating-linear-gradient(
0deg,
transparent,
transparent 1px,
rgba(0,0,0,.15) 1px,
rgba(0,0,0,.15) 2px
);
}
.scanlines.heavy{
background:repeating-linear-gradient(
0deg,
transparent,
transparent 1px,
rgba(0,0,0,.3) 1px,
rgba(0,0,0,.3) 3px
);
}

/* ═══ PHOSPHOR BLOOM ═══ */
.bloom{
position:absolute;inset:0;pointer-events:none;z-index:5;
background:radial-gradient(ellipse at center,rgba(218,255,74,.06) 0%,transparent 70%);
}

</style>
</head>
<body>

<div class="board-header">
<div>
<h1>HADAL V2</h1>
<div class="sub">VISUAL SYSTEMS BOARD — MOODBOARD — NOT FOR PRODUCTION</div>
</div>
<div class="meta">
CLASSIFICATION: INTERNAL DESIGN REVIEW<br>
REVISION: 001 &nbsp;|&nbsp; TILES: 16<br>
<span id="headerTime"></span>
</div>
</div>

<div class="board" id="board">
<!-- Tiles injected by JS -->
</div>

<script>
// ══════════════════════════════════════════════
// HADAL V2 MOODBOARD — ALL 16 TILES
// ══════════════════════════════════════════════

const G = '#DAFF4A';
const G2 = 'rgba(218,255,74,';
const AMB = '#FF9814';
const BG = '#050700';
const PI = Math.PI;
const TAU = PI*2;

// Header clock
function updateClock(){
const d=new Date();
document.getElementById('headerTime').textContent=
d.toISOString().replace('T',' ').slice(0,19)+' UTC';
}
updateClock();setInterval(updateClock,1000);

// Board element
const board = document.getElementById('board');

// Tile definitions
const tiles = [
{num:'01',label:'LOCK GEOMETRY',id:'lock'},
{num:'02',label:'DENSE MONITOR SCAN',id:'scan'},
{num:'03',label:'GEOLOCATION OVERLAY',id:'geo'},
{num:'04',label:'ACTIVATED CIRCUIT TRACES',id:'circuit'},
{num:'05',label:'CHIP / HARDWARE SURFACE',id:'chip'},
{num:'06',label:'BINARY LOCKED SQUARE',id:'binary'},
{num:'07',label:'SATELLITE RECONSTRUCTION',id:'sat'},
{num:'08',label:'GLYPH / INSIGNIA SYSTEM',id:'glyph'},
{num:'09',label:'SENTINEL EMBLEM',id:'sentinel'},
{num:'10',label:'EXPLORER HEX MESH',id:'hex'},
{num:'11',label:'ORBITAL PROBE OBJECT',id:'orbital'},
{num:'12',label:'TELEMETRY ISLANDS',id:'telemetry'},
{num:'13',label:'DIAGONAL GRAPHIC BANDS',id:'diag'},
{num:'14',label:'STRUCTURAL TYPOGRAPHY',id:'structtype'},
{num:'15',label:'RESTRICTED AMBER LANGUAGE',id:'amber'},
{num:'16',label:'RASTER MICRO MODULES',id:'micro'},
];

tiles.forEach(t=>{
const div=document.createElement('div');
div.className='tile';
div.id='tile-'+t.id;
div.innerHTML=`
<div class="tile-num">${t.num}</div>
<div class="tile-body" id="body-${t.id}"></div>
<div class="tile-label">${t.label}</div>
`;
board.appendChild(div);
});


// ════════════════════════════════════════
// 01. LOCK GEOMETRY
// ════════════════════════════════════════
(function(){
const body=document.getElementById('body-lock');
const c=document.createElement('canvas');
body.parentElement.querySelector('.tile-body').remove();
body.parentElement.appendChild(c);
c.style.cssText='position:absolute;inset:0;width:100%;height:100%;z-index:1';
const num=document.createElement('div');
num.className='tile-num';num.textContent='01';
body.parentElement.appendChild(num);

function draw(){
const W=c.width=c.offsetWidth, H=c.height=c.offsetHeight;
const x=c.getContext('2d');
const cx=W/2, cy=H/2;
x.fillStyle=BG;x.fillRect(0,0,W,H);

// Outer acquisition box
x.strokeStyle=G2+'.3)';x.lineWidth=1;
x.strokeRect(cx-140,cy-140,280,280);
// Corner brackets
const bk=20;
[[cx-140,cy-140,1,1],[cx+140,cy-140,-1,1],[cx-140,cy+140,1,-1],[cx+140,cy+140,-1,-1]].forEach(([bx,by,dx,dy])=>{
x.strokeStyle=G;x.lineWidth=2;
x.beginPath();x.moveTo(bx,by+dy*bk);x.lineTo(bx,by);x.lineTo(bx+dx*bk,by);x.stroke();
});

// Second box
x.strokeStyle=G2+'.2)';x.lineWidth=1;
x.strokeRect(cx-100,cy-100,200,200);

// Inner box
x.strokeStyle=G2+'.5)';x.lineWidth=1.5;
x.strokeRect(cx-60,cy-60,120,120);

// Crosshairs
x.strokeStyle=G2+'.4)';x.lineWidth=1;
x.setLineDash([4,6]);
x.beginPath();x.moveTo(cx-160,cy);x.lineTo(cx+160,cy);x.stroke();
x.beginPath();x.moveTo(cx,cy-160);x.lineTo(cx,cy+160);x.stroke();
x.setLineDash([]);

// Center cross
x.strokeStyle=G;x.lineWidth=2;
x.beginPath();x.moveTo(cx-12,cy);x.lineTo(cx+12,cy);x.stroke();
x.beginPath();x.moveTo(cx,cy-12);x.lineTo(cx,cy+12);x.stroke();

// Rotating ring
const t=Date.now()/3000;
x.save();x.translate(cx,cy);x.rotate(t);
x.strokeStyle=G2+'.35)';x.lineWidth=1;
x.beginPath();x.arc(0,0,90,0,PI*1.2);x.stroke();
x.beginPath();x.arc(0,0,90,PI*1.4,PI*1.9);x.stroke();
x.restore();

// Counter-rotating ring
x.save();x.translate(cx,cy);x.rotate(-t*0.7);
x.strokeStyle=G2+'.2)';x.lineWidth=1;
x.beginPath();x.arc(0,0,110,0.3,PI*0.9);x.stroke();
x.beginPath();x.arc(0,0,110,PI*1.1,PI*1.8);x.stroke();
x.restore();

// Diamond
x.save();x.translate(cx,cy);x.rotate(PI/4);
x.strokeStyle=G2+'.25)';x.lineWidth=1;
x.strokeRect(-45,-45,90,90);
x.restore();

// Measurement labels
x.font='8px "Share Tech Mono"';x.fillStyle=G2+'.5)';
x.fillText('RNG 2.4KM',cx+145,cy-4);
x.fillText('AZ 047.2°',cx+145,cy+10);
x.fillText('EL +12.8°',cx-140,cy+155);
x.fillText('TRK 224',cx-140,cy+168);
x.fillText('LOCK',cx+50,cy-145);
x.fillText('ACQ',cx-70,cy-145);

// Scale ticks on top edge
for(let i=-6;i<=6;i++){
const tx=cx+i*20;
x.strokeStyle=G2+(i===0?'.6)':'.2)');x.lineWidth=1;
x.beginPath();x.moveTo(tx,cy-140);x.lineTo(tx,cy-140+(i%3===0?8:4));x.stroke();
}
// Scale ticks on left edge
for(let i=-6;i<=6;i++){
const ty=cy+i*20;
x.strokeStyle=G2+(i===0?'.6)':'.2)');x.lineWidth=1;
x.beginPath();x.moveTo(cx-140,ty);x.lineTo(cx-140+(i%3===0?8:4),ty);x.stroke();
}

// Blinking dot
if(Math.sin(Date.now()/300)>0){
x.fillStyle=G;
x.fillRect(cx-2,cy-2,4,4);
}

requestAnimationFrame(draw);
}
draw();
})();


// ════════════════════════════════════════
// 02. DENSE MONITOR SCAN
// ════════════════════════════════════════
(function(){
const tile=document.getElementById('tile-scan');
const body=document.getElementById('body-scan');
body.remove();
const c=document.createElement('canvas');
c.style.cssText='position:absolute;inset:0;width:100%;height:100%;z-index:1';
tile.appendChild(c);

// Heavy scanlines
const sl=document.createElement('div');
sl.className='scanlines heavy';tile.appendChild(sl);
const bl=document.createElement('div');
bl.className='bloom';tile.appendChild(bl);

let scanY=0;
function draw(){
const W=c.width=c.offsetWidth, H=c.height=c.offsetHeight;
const x=c.getContext('2d');
x.fillStyle='#020400';x.fillRect(0,0,W,H);

const t=Date.now()/1000;

// Phosphor noise field
const imgD=x.createImageData(W,H);
const d=imgD.data;
for(let i=0;i<d.length;i+=4){
const py=Math.floor((i/4)/W);
const px=(i/4)%W;
const n=Math.random();
const scanDist=Math.abs(py-scanY);
const scanBoost=scanDist<8?0.3:0;
const base=n<0.15?(0.08+scanBoost):0;
// Thermal-ish hot spots
const hx=W*0.4,hy=H*0.45;
const dist=Math.sqrt((px-hx)**2+(py-hy)**2);
const heat=Math.max(0,1-dist/120)*0.25;
const v=base+heat;
d[i]=Math.floor(218*v*0.4);
d[i+1]=Math.floor(255*v);
d[i+2]=Math.floor(74*v*0.3);
d[i+3]=255;
}
x.putImageData(imgD,0,0);

// Scan sweep line
scanY=(scanY+1.5)%H;
x.fillStyle=G2+'.08)';
x.fillRect(0,scanY-20,W,40);
x.fillStyle=G2+'.2)';
x.fillRect(0,scanY-1,W,2);

// Readout overlays
x.font='9px "Share Tech Mono"';
x.fillStyle=G2+'.7)';
x.fillText('ISR-FEED::CH04',10,20);
x.fillText('FLIR/MWIR',10,32);
x.fillText('GAIN:+14.2dB',10,44);
x.fillText(Math.floor(t)%2===0?'▮ REC':'  REC',W-60,20);
x.fillStyle=G2+'.4)';
x.fillText('FRM:'+String(Math.floor(t*24)%9999).padStart(4,'0'),W-80,H-20);
x.fillText('SNR:'+((Math.sin(t)*5+18).toFixed(1))+'dB',10,H-20);

// Target box
const bx=W*0.35,by=H*0.38,bw=80,bh=60;
x.strokeStyle=G2+'.5)';x.lineWidth=1;
x.strokeRect(bx,by,bw,bh);
x.font='7px "Share Tech Mono"';
x.fillStyle=G;
x.fillText('TGT-01',bx+2,by-3);

requestAnimationFrame(draw);
}
draw();
})();


// ════════════════════════════════════════
// 03. GEOLOCATION OVERLAY
// ════════════════════════════════════════
(function(){
const body=document.getElementById('body-geo');
body.style.cssText='position:absolute;inset:0;padding:50px 12px 30px;display:flex;flex-direction:column;justify-content:center;gap:0;font-size:9px;line-height:1;letter-spacing:1px;overflow:hidden;';

const lines=[
{t:'COORD',v:'25°15\'42.8"N  055°18\'23.1"E',c:G},
{t:'MGRS',v:'40R CM 4832 9547',c:G},
{t:'AZ/RNG',v:'047.2° TRUE / 2.418 KM',c:G},
{t:'ALT',v:'+000042M MSL',c:G},
{t:'CEP',v:'3.2M (90%)',c:G2+'.6)'},
{t:'SRC',v:'SIGINT/ELINT COLLECT',c:G},
{t:'TIME',v:'2026-03-22T14:32:08.442Z',c:G},
{t:'DWELL',v:'00:04:12.8',c:G2+'.5)'},
{t:'',v:'',c:''},
{t:'FREQ',v:'9.375 GHZ X-BAND',c:G},
{t:'PRI',v:'1247μs STAGGER',c:G},
{t:'SNR',v:'+22.4 dB',c:G},
{t:'CLASS',v:'SAM ENGAGEMENT RADAR',c:AMB},
{t:'THREAT',v:'SA-21 GROWLER / S-400',c:AMB},
{t:'CONF',v:'0.87 HIGH',c:G},
{t:'',v:'',c:''},
{t:'GRID',v:'▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓',c:G2+'.12)'},
{t:'STATUS',v:'▮ ACTIVE TRACK',c:G},
];

let html='';
lines.forEach(l=>{
if(!l.t&&!l.v){html+='<div style="height:8px"></div>';return;}
html+=`<div style="display:flex;gap:8px;margin:2px 0;align-items:baseline">
<span style="color:${G2}.35);min-width:52px;font-size:7px;letter-spacing:2px">${l.t}</span>
<span style="color:${l.c};font-family:'Share Tech Mono',monospace;font-size:9px">${l.v}</span>
</div>`;
});

// Dense coordinate grid background
html+='<div style="position:absolute;inset:0;z-index:-1;opacity:.04;font-size:7px;line-height:8px;overflow:hidden;padding:8px;word-break:break-all;color:'+G+'">';
for(let i=0;i<800;i++)html+=(Math.random()*90|0).toString().padStart(2,'0')+' ';
html+='</div>';

body.innerHTML=html;
})();


// ════════════════════════════════════════
// 04. ACTIVATED CIRCUIT TRACES
// ════════════════════════════════════════
(function(){
const tile=document.getElementById('tile-circuit');
const body=document.getElementById('body-circuit');
body.remove();
const c=document.createElement('canvas');
c.style.cssText='position:absolute;inset:0;width:100%;height:100%;z-index:1';
tile.appendChild(c);

// Substrate grid
const sub=document.createElement('div');
sub.className='circuit-surface';tile.appendChild(sub);

function draw(){
const W=c.width=c.offsetWidth, H=c.height=c.offsetHeight;
const x=c.getContext('2d');
x.clearRect(0,0,W,H);

const t=Date.now()/1000;
const gridS=20;

// Draw PCB traces
x.lineWidth=2;x.lineCap='square';

// Horizontal traces
const traces=[
{y:0.2,x1:0.05,x2:0.7,active:true},
{y:0.2,x1:0.7,x2:0.7,vert:true,y2:0.35,active:true},
{y:0.35,x1:0.7,x2:0.95,active:true},
{y:0.4,x1:0.1,x2:0.5,active:false},
{y:0.4,x1:0.5,x2:0.5,vert:true,y2:0.6,active:false},
{y:0.6,x1:0.5,x2:0.9,active:false},
{y:0.55,x1:0.05,x2:0.35,active:true},
{y:0.55,x1:0.35,x2:0.35,vert:true,y2:0.75,active:true},
{y:0.75,x1:0.35,x2:0.85,active:true},
{y:0.8,x1:0.15,x2:0.6,active:false},
{y:0.3,x1:0.15,x2:0.45,active:true},
];

traces.forEach(tr=>{
const act=tr.active;
x.strokeStyle=act?G2+'.6)':G2+'.12)';
x.lineWidth=act?2:1;
x.beginPath();
if(tr.vert){
x.moveTo(tr.x1*W,tr.y*H);
x.lineTo(tr.x1*W,tr.y2*H);
}else{
x.moveTo(tr.x1*W,tr.y*H);
x.lineTo(tr.x2*W,tr.y*H);
}
x.stroke();

// Via pads at endpoints
if(act){
const px=tr.vert?tr.x1*W:tr.x2*W;
const py=tr.vert?tr.y2*H:tr.y*H;
x.fillStyle=G2+'.8)';
x.fillRect(px-3,py-3,6,6);
x.fillStyle=BG;
x.fillRect(px-1,py-1,2,2);
}
});

// Activation pulse traveling along trace
const pulsePos=(t*0.3)%1;
traces.filter(tr=>tr.active).forEach((tr,i)=>{
const p=((pulsePos+i*0.2)%1);
let px,py;
if(tr.vert){
px=tr.x1*W;
py=tr.y*H+(tr.y2-tr.y)*H*p;
}else{
px=(tr.x1+(tr.x2-tr.x1)*p)*W;
py=tr.y*H;
}
x.fillStyle=G;
x.shadowColor=G;x.shadowBlur=8;
x.fillRect(px-2,py-2,4,4);
x.shadowBlur=0;
});

// IC pads
[[0.5,0.2,28,16],[0.2,0.55,20,20],[0.75,0.75,24,14],[0.45,0.4,16,12]].forEach(([px,py,w,h])=>{
x.fillStyle=G2+'.06)';
x.fillRect(px*W-w/2,py*H-h/2,w,h);
x.strokeStyle=G2+'.2)';x.lineWidth=1;
x.strokeRect(px*W-w/2,py*H-h/2,w,h);
// Pin marks
for(let p=0;p<4;p++){
x.fillStyle=G2+'.3)';
x.fillRect(px*W-w/2-4,py*H-h/2+3+p*(h-6)/3,3,2);
x.fillRect(px*W+w/2+1,py*H-h/2+3+p*(h-6)/3,3,2);
}
});

// Labels
x.font='7px "Share Tech Mono"';x.fillStyle=G2+'.3)';
x.fillText('U1',0.5*W+16,0.2*H-10);
x.fillText('U2',0.2*W+14,0.55*H-12);
x.fillText('R14',0.75*W+14,0.75*H-8);
x.fillText('J3',0.45*W+10,0.4*H-7);

requestAnimationFrame(draw);
}
draw();
})();

// ════════════════════════════════════════
// 10. EXPLORER HEX MESH
// ════════════════════════════════════════
(function(){
const tile=document.getElementById('tile-hex');
const body=document.getElementById('body-hex');
body.remove();
const c=document.createElement('canvas');
c.style.cssText='position:absolute;inset:0;width:100%;height:100%;z-index:1';
tile.appendChild(c);

function draw(){
const W=c.width=c.offsetWidth, H=c.height=c.offsetHeight;
const x=c.getContext('2d');
x.fillStyle='#030500';x.fillRect(0,0,W,H);

const t=Date.now()/2000;
const hexR=18;
const hexH=hexR*Math.sqrt(3);

for(let row=-1;row<H/hexH+1;row++){
for(let col=-1;col<W/(hexR*3)+1;col++){
const cx_h=col*hexR*3+(row%2)*hexR*1.5;
const cy_h=row*hexH*0.5;
const dist=Math.sqrt((cx_h-W/2)**2+(cy_h-H/2)**2);
const maxDist=Math.sqrt((W/2)**2+(H/2)**2);
const norm=dist/maxDist;

// Activation wave
const wave=Math.sin(t-dist/80)*0.5+0.5;
const active=dist<120&&wave>0.6;

x.beginPath();
for(let i=0;i<6;i++){
const a=PI/6+i*PI/3;
const hx=cx_h+Math.cos(a)*hexR*0.9;
const hy=cy_h+Math.sin(a)*hexR*0.9;
i===0?x.moveTo(hx,hy):x.lineTo(hx,hy);
}
x.closePath();

if(active){
x.fillStyle=G2+(.08+wave*.12).toFixed(3)+')';
x.fill();
x.strokeStyle=G2+(.3+wave*.3).toFixed(3)+')';
}else{
x.strokeStyle=G2+(.06+norm*.04).toFixed(3)+')';
}
x.lineWidth=0.5;x.stroke();
}
}

// Center hex highlight
x.strokeStyle=G2+'.5)';x.lineWidth=2;
x.beginPath();
for(let i=0;i<6;i++){
const a=PI/6+i*PI/3;
i===0?x.moveTo(W/2+Math.cos(a)*hexR,H/2+Math.sin(a)*hexR):
x.lineTo(W/2+Math.cos(a)*hexR,H/2+Math.sin(a)*hexR);
}
x.closePath();x.stroke();

x.font='7px "Share Tech Mono"';x.fillStyle=G2+'.4)';
x.fillText('PROBE SURFACE MESH',14,20);
x.fillText('HEX LATTICE R='+hexR,14,32);

requestAnimationFrame(draw);
}
draw();
})();

(function(){

const t=Date.now()/2000;

// Globe outline

x.beginPath();x.arc(cx,cy,R,0,TAU);x.stroke();

// Latitude lines

const r=R*Math.cos(lat*PI/180);
const y=cy-R*Math.sin(lat*PI/180);
x.strokeStyle=G2+'.08)';x.lineWidth=0.5;
x.beginPath();x.ellipse(cx,y,r,r*0.15,0,0,TAU);x.stroke();
}

// Longitude lines
for(let lon=0;lon<180;lon+=30){
x.save();x.translate(cx,cy);x.rotate((lon+t*20)*PI/180);
x.strokeStyle=G2+'.08)';x.lineWidth=0.5;
x.beginPath();x.ellipse(0,0,R*0.15,R,0,0,TAU);x.stroke();
x.restore();
}

// Dot-field land approximation
const dotStep=6;
for(let dy=-R;dy<=R;dy+=dotStep){
for(let dx=-R;dx<=R;dx+=dotStep){
if(dx*dx+dy*dy>R*R)continue;
const lon=(Math.atan2(dx,Math.sqrt(R*R-dx*dx-dy*dy))*180/PI+t*20)%360;
const lat=Math.asin(dy/R)*180/PI;
// Crude continental shapes via noise-ish function
const v=Math.sin(lon*0.05)*Math.cos(lat*0.08)+Math.sin(lon*0.03+lat*0.04)*0.5;
if(v>0.2&&Math.abs(lat)<70){
const bright=0.15+v*0.25;
x.fillStyle=G2+bright.toFixed(2)+')';
x.fillRect(cx+dx-1,cy+dy-1,2,2);
}
}
}

// Orbital ring
x.save();x.translate(cx,cy);x.rotate(0.3);
x.strokeStyle=G2+'.25)';x.lineWidth=1;
x.beginPath();x.ellipse(0,0,R*1.5,R*0.3,0.2,0,TAU);x.stroke();
// Satellite dot on orbit
const satA=t*1.5;
const sx=Math.cos(satA)*R*1.5;
const sy=Math.sin(satA)*R*0.3;
x.fillStyle=G;x.fillRect(sx-2,sy-2,4,4);
// Orbit connector to label
if(sy<0){// only when in front
x.strokeStyle=G2+'.3)';x.setLineDash([2,4]);
x.beginPath();x.moveTo(sx,sy);x.lineTo(sx+30,sy-20);x.stroke();
x.setLineDash([]);
x.font='7px "Share Tech Mono"';x.fillStyle=G2+'.6)';
x.fillText('SAT-07',sx+32,sy-18);
}
x.restore();

// Rim glow
const rim=x.createRadialGradient(cx,cy,R*0.8,cx,cy,R*1.1);
rim.addColorStop(0,'transparent');
rim.addColorStop(0.8,G2+'.03)');
rim.addColorStop(1,'transparent');
x.fillStyle=rim;x.fillRect(0,0,W,H);

// Telemetry readout
x.font='8px "Share Tech Mono"';x.fillStyle=G2+'.5)';
x.fillText('ORBITAL SCAN',12,20);
x.fillText('PROBE: HADAL-OBJ-11',12,32);
x.fillText('PERIOD: 92.4min',W-110,20);
x.fillText('INC: 51.6°',W-110,32);

requestAnimationFrame(draw);
}
draw();
})();

div.appendChild(n);
}else if(m.type==='dots'){
const cv=document.createElement('canvas');
cv.style.cssText='width:100%;height:100%';
div.appendChild(cv);
requestAnimationFrame(function animD(){
cv.width=cv.offsetWidth;cv.height=cv.offsetHeight;
const xx=cv.getContext('2d');if(!xx)return;
for(let r=0;r<cv.height;r+=6){
for(let c2=0;c2<cv.width;c2+=6){
const v=Math.sin(Date.now()/500+r*0.1+c2*0.1)*0.5+0.5;
xx.fillStyle=G2+(v*0.3).toFixed(2)+')';
xx.fillRect(c2,r,3,3);
}
}
requestAnimationFrame(animD);
});
}else if(m.type==='center'){
const cv=document.createElement('canvas');
cv.style.cssText='width:100%;height:100%';
div.appendChild(cv);
requestAnimationFrame(function animC(){
cv.width=cv.offsetWidth;cv.height=cv.offsetHeight;
const xx=cv.getContext('2d');if(!xx)return;
const ccx=cv.width/2,ccy=cv.height/2;
xx.fillStyle='#030500';xx.fillRect(0,0,cv.width,cv.height);
// Radar sweep
const a=Date.now()/1000;
xx.strokeStyle=G2+'.2)';xx.lineWidth=0.5;
for(let r=15;r<Math.min(ccx,ccy);r+=15){
xx.beginPath();xx.arc(ccx,ccy,r,0,TAU);xx.stroke();
}
// Sweep
xx.fillStyle=G2+'.15)';
xx.beginPath();xx.moveTo(ccx,ccy);
xx.arc(ccx,ccy,Math.min(ccx,ccy),a,a+0.4);
xx.closePath();xx.fill();
// Blips
for(let i=0;i<5;i++){
const ba=i*1.3+Math.sin(i)*0.5;
const br=20+i*12;
xx.fillStyle=G;
xx.fillRect(ccx+Math.cos(ba)*br-1,ccy+Math.sin(ba)*br-1,3,3);
}
xx.strokeStyle=G2+'.4)';xx.lineWidth=1;
xx.beginPath();xx.moveTo(ccx,ccy);
xx.lineTo(ccx+Math.cos(a)*Math.min(ccx,ccy),ccy+Math.sin(a)*Math.min(ccx,ccy));
xx.stroke();
requestAnimationFrame(animC);
});
}

body.appendChild(div);
});
})();

// ════════════════════════════════════════
// 16. RASTER MICRO MODULES
// ════════════════════════════════════════
(function(){
const body=document.getElementById('body-micro');
body.style.cssText='position:absolute;inset:0;padding:48px 6px 28px';

const grid=document.createElement('div');
grid.className='micro-grid';
body.appendChild(grid);

const microTypes=['SIGNAL','BINARY','THERMAL','SPECTRUM','PHASE','VECTOR','DENSITY','STATUS','HASH'];

microTypes.forEach((label,idx)=>{
const mod=document.createElement('div');
mod.className='micro-mod';

const lbl=document.createElement('div');
lbl.className='micro-label';lbl.textContent=label;
mod.appendChild(lbl);

const cv=document.createElement('canvas');
mod.appendChild(cv);
grid.appendChild(mod);

requestAnimationFrame(function anim(){
cv.width=cv.offsetWidth||60;cv.height=cv.offsetHeight||60;
const xx=cv.getContext('2d');if(!xx){requestAnimationFrame(anim);return;}
xx.fillStyle='#040600';xx.fillRect(0,0,cv.width,cv.height);
const t=Date.now()/1000;

switch(idx%9){
case 0:// Signal waveform
xx.strokeStyle=G2+'.7)';xx.lineWidth=1;
xx.beginPath();
for(let i=0;i<cv.width;i++){
const v=Math.sin(i*0.3+t*3)*cv.height*0.35+cv.height/2;
i===0?xx.moveTo(i,v):xx.lineTo(i,v);
}
xx.stroke();break;
case 1:// Binary raster
for(let r=0;r<cv.height;r+=4){
for(let c2=0;c2<cv.width;c2+=4){
const on=((r*7+c2*13+Math.floor(t))%5)>2;
xx.fillStyle=on?G2+'.5)':G2+'.05)';
xx.fillRect(c2,r,3,3);
}}break;
case 2:// Thermal map
for(let r=0;r<cv.height;r+=3){
for(let c2=0;c2<cv.width;c2+=3){
const v=Math.sin(c2*0.1+t)*Math.cos(r*0.1)*0.5+0.5;
const rr=Math.floor(218*v*0.5+80*v);
const gg=Math.floor(255*v*0.6);
const bb=Math.floor(74*v*0.2);
xx.fillStyle=`rgba(${rr},${gg},${bb},${v*0.7})`;
xx.fillRect(c2,r,3,3);
}}break;
case 3:// Spectrum bars
for(let c2=0;c2<cv.width;c2+=3){
const h=(Math.sin(c2*0.2+t*2)*0.5+0.5)*cv.height*0.8;
xx.fillStyle=G2+(.3+Math.random()*.3).toFixed(2)+')';
xx.fillRect(c2,cv.height-h,2,h);
}break;
case 4:// Phase dots
for(let r=0;r<cv.height;r+=6){
for(let c2=0;c2<cv.width;c2+=6){
const phase=Math.sin(t*2+r*0.2+c2*0.2)*0.5+0.5;
xx.fillStyle=G2+(phase*0.6).toFixed(2)+')';
xx.beginPath();xx.arc(c2+3,r+3,1.5,0,TAU);xx.fill();
}}break;
case 5:// Vector field
xx.strokeStyle=G2+'.4)';xx.lineWidth=0.5;
for(let r=4;r<cv.height;r+=8){
for(let c2=4;c2<cv.width;c2+=8){
const a=Math.sin(t+r*0.1)*PI;
xx.beginPath();xx.moveTo(c2,r);
xx.lineTo(c2+Math.cos(a)*3,r+Math.sin(a)*3);xx.stroke();
}}break;
case 6:// Density heatmap
for(let r=0;r<cv.height;r+=2){
for(let c2=0;c2<cv.width;c2+=2){
const d=Math.sqrt((c2-cv.width/2)**2+(r-cv.height/2)**2);
const v=Math.max(0,1-d/(cv.width*0.4))*(.5+Math.sin(t*2)*0.2);
xx.fillStyle=G2+(v*0.8).toFixed(2)+')';
xx.fillRect(c2,r,2,2);
}}break;
case 7:// Status blocks
const states=[G2+'.6)',G2+'.15)',G2+'.6)',AMB.replace(')',',0.5)').replace('rgb','rgba')];
for(let r=0;r<4;r++){
for(let c2=0;c2<4;c2++){
const si=(r*4+c2+Math.floor(t))%4;
const bw=cv.width/4-1,bh=cv.height/4-1;
xx.fillStyle=states[si];
xx.fillRect(c2*(bw+1),r*(bh+1),bw,bh);
}}break;
case 8:// Hash/noise
for(let i=0;i<200;i++){
const rx=Math.random()*cv.width;
const ry=Math.random()*cv.height;
xx.fillStyle=G2+(Math.random()*0.4).toFixed(2)+')';
xx.fillRect(rx,ry,2,2);
}break;
}
requestAnimationFrame(anim);
});
});
})();
