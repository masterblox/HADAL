name: Update RSS Feeds

on:
  schedule:
    - cron: '0 */3 * * *'  # Every 3 hours (8 times/day instead of 24)
  workflow_dispatch:  # Manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: pip install feedparser
      
    - name: Fetch RSS feeds
      env:
        NEWSDATA_API_KEY: ${{ secrets.NEWSDATA_API_KEY }}
      run: python scripts/fetch_rss.py
      
    - name: Fetch price data
      run: python scripts/fetch_prices.py
      
    - name: Generate regional stats
      run: python scripts/generate_regional_stats.py public/incidents.json public/data/regional_stats.json
      
    - name: Generate cross-source verification
      run: python scripts/cross_source_verification.py
      
    - name: Fetch airspace data (NOTAMs)
      run: python scripts/fetch_airspace.py || echo "Airspace fetch completed with warnings"
      
    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add public/incidents.json public/prices.json public/data/regional_stats.json public/airspace.json
        git diff --staged --quiet || (git commit -m "Update incidents, prices, regional stats, and airspace data" && git push)
