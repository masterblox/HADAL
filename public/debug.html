<!DOCTYPE html>
<html>
<head>
    <title>Coordinate Debug</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #1a1a1a; color: #fff; }
        .incident { background: #2a2a2a; padding: 15px; margin: 10px 0; border-radius: 8px; }
        .coords { color: #4CAF50; }
        .error { color: #f44336; }
    </style>
</head>
<body>
    <h1>Coordinate Debug Test</h1>
    <div id="output">Loading...</div>
    
    <script>
        fetch('https://gulfwatch-testing.vercel.app/incidents.json')
            .then(r => r.json())
            .then(data => {
                const output = document.getElementById('output');
                let html = `<p>Total: ${data.total_incidents}</p>`;
                
                data.incidents.slice(0, 5).forEach((inc, i) => {
                    const loc = inc.location;
                    const hasCoords = loc && loc.lat !== undefined && loc.lng !== undefined;
                    
                    html += `
                        <div class="incident">
                            <strong>#${i+1}:</strong> ${inc.title?.substring(0, 50)}...<br>
                            Location object: ${JSON.stringify(loc)}<br>
                            <span class="${hasCoords ? 'coords' : 'error'}">
                                ${hasCoords 
                                    ? `✅ Coordinates: ${loc.lat.toFixed(4)}, ${loc.lng.toFixed(4)}`
                                    : `❌ No coordinates: lat=${loc?.lat}, lng=${loc?.lng}`
                                }
                            </span>
                        </div>
                    `;
                });
                
                output.innerHTML = html;
            })
            .catch(err => {
                document.getElementById('output').innerHTML = `<span class="error">Error: ${err}</span>`;
            });
    </script>
</body>
</html>
