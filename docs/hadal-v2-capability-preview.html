<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HADAL V2 — Capability Preview Board</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Teko:wght@300;400;500;600;700&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
--g:#DAFF4A;--amb:#FF9814;--bg:#050700;
}
html{background:var(--bg);color:var(--g);font-family:'Share Tech Mono',monospace;font-size:10px}
body{min-height:100vh}

.hdr{
padding:16px 24px 12px;
border-bottom:4px solid var(--g);
display:flex;justify-content:space-between;align-items:flex-end;
background:linear-gradient(180deg,rgba(218,255,74,.04) 0%,transparent 100%);
}
.hdr h1{font-family:'Teko';font-weight:700;font-size:48px;letter-spacing:8px;line-height:.85}
.hdr .sub{font-size:9px;letter-spacing:4px;color:rgba(218,255,74,.3);margin-top:4px}
.hdr .meta{text-align:right;font-size:8px;letter-spacing:3px;color:rgba(218,255,74,.2);line-height:2}

.board{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:2px;padding:2px;
background:rgba(218,255,74,.06);
filter:brightness(1.35);
}

.tile{
background:var(--bg);
position:relative;overflow:hidden;
min-height:480px;
border-left:3px solid rgba(218,255,74,.08);
}
.tile:nth-child(4n+1){border-left:3px solid rgba(218,255,74,.2)}
.tile:nth-child(odd) .tile-num{left:auto;right:10px;text-align:right}

.tile-num{
position:absolute;top:6px;left:10px;z-index:20;
font-family:'Teko';font-weight:700;font-size:52px;
color:var(--g);line-height:.8;letter-spacing:3px;
mix-blend-mode:screen;
}

.tile-label{
position:absolute;bottom:0;left:0;right:0;z-index:20;
padding:4px 8px 3px;
background:rgba(5,7,0,.95);
border-top:2px solid rgba(218,255,74,.15);
}
.tile-label .row{display:flex;justify-content:space-between;align-items:center}
.tile-label .name{font-family:'Teko';font-size:11px;font-weight:600;letter-spacing:4px;text-transform:uppercase;color:rgba(218,255,74,.6)}
.tile-label .vf{font-size:5px;letter-spacing:2px;color:rgba(218,255,74,.15);margin-top:1px}
.tile-label .st{font-size:6px;letter-spacing:2px;padding:1px 5px;font-family:'Share Tech Mono'}
.st.real{color:var(--g);border:1px solid rgba(218,255,74,.4);background:rgba(218,255,74,.06)}
.st.partial{color:var(--g);border:1px solid rgba(218,255,74,.2);background:rgba(218,255,74,.02)}
.st.fork{color:var(--amb);border:1px solid rgba(255,152,20,.3);background:rgba(255,152,20,.04)}
.st.future{color:rgba(218,255,74,.3);border:1px solid rgba(218,255,74,.1)}

.tile canvas{position:absolute;inset:0;width:100%;height:100%;z-index:1}
.scn{position:absolute;inset:0;pointer-events:none;z-index:10;
background:repeating-linear-gradient(0deg,transparent,transparent 1px,rgba(0,0,0,.15) 1px,rgba(0,0,0,.15) 2px)}
.scn.hv{background:repeating-linear-gradient(0deg,transparent,transparent 1px,rgba(0,0,0,.3) 1px,rgba(0,0,0,.3) 3px)}
.blm{position:absolute;inset:0;pointer-events:none;z-index:5;background:radial-gradient(ellipse at 40% 45%,rgba(218,255,74,.07) 0%,transparent 65%)}

/* Diagonal cut marks on some tiles */
.tile:nth-child(3n)::after{
content:'';position:absolute;top:0;right:0;z-index:15;pointer-events:none;
width:0;height:0;border-top:24px solid rgba(218,255,74,.08);border-left:24px solid transparent;
}
</style>
</head>
<body>

<div class="hdr">
<div>
<h1>HADAL V2</h1>
<div class="sub">CAPABILITY PREVIEW — 16 SUBSYSTEMS — VISUAL VOCABULARY APPLIED</div>
</div>
<div class="meta">
CLASSIFICATION: INTERNAL<br>
REV 002 &nbsp;|&nbsp; HONEST STATUS<br>
<span id="hTime"></span>
</div>
</div>

<div class="board" id="board"></div>

<script>
const G='#DAFF4A',G2='rgba(218,255,74,',AMB='#FF9814',BG='#050700',PI=Math.PI,TAU=PI*2;
const DPR=window.devicePixelRatio||1;
function hd(cv){
const W=cv.offsetWidth,H=cv.offsetHeight;
cv.width=W*DPR;cv.height=H*DPR;
const ctx=cv.getContext('2d');
ctx.setTransform(DPR,0,0,DPR,0,0);
return{W,H,x:ctx};
}
function updClock(){document.getElementById('hTime').textContent=new Date().toISOString().replace('T',' ').slice(0,19)+' UTC'}
updClock();setInterval(updClock,1000);

// Shared: dense raster base texture
function rasterBase(x,W,H,density){
const pW=W*DPR,pH=H*DPR;
const imgD=x.createImageData(pW,pH);
const d=imgD.data;
for(let i=0;i<d.length;i+=4){
const n=Math.random();
const v=n<density?.06+(n*2):0;
d[i]=Math.floor(218*v*.5);d[i+1]=Math.floor(255*v);d[i+2]=Math.floor(74*v*.3);d[i+3]=255;
}
x.save();x.setTransform(1,0,0,1,0,0);x.putImageData(imgD,0,0);x.restore();
x.setTransform(DPR,0,0,DPR,0,0);
}

// Shared: subsystem stamp mark
function stamp(x,sx,sy,code){
x.save();
x.font='5px "Share Tech Mono"';x.fillStyle=G2+'.12)';
x.fillText('▪ '+code,sx,sy);
x.strokeStyle=G2+'.06)';x.lineWidth=.5;
x.strokeRect(sx-2,sy-6,code.length*3.5+12,9);
x.restore();
}

// Shared: diagonal graphic band
function diagBand(x,W,H,y,thick,text,isAmb){
x.save();
x.translate(0,y);x.rotate(-6*PI/180);
const h=thick?14:6;
x.fillStyle=isAmb?'rgba(255,152,20,'+(thick?.7:.15)+')':G2+(thick?'.6)':'.08)');
x.fillRect(-20,0,W+40,h);
if(text&&thick){
x.font='bold '+(h-2)+'px "Teko"';
x.fillStyle=isAmb?BG:BG;
x.fillText(text,8,h-2);
x.fillText(text,W*.4,h-2);
}
x.restore();
}

const caps=[
{num:'01',name:'EVENT → SIGNAL → ENTITY',vf:'VF04+VF03',st:'fork',stText:'FORK DIRECTION',id:'ese'},
{num:'02',name:'CONFIDENCE EXPLANATION',vf:'VF06+VF03',st:'partial',stText:'PARTIAL NOW',id:'conf'},
{num:'03',name:'CROSS-SOURCE VERIFICATION',vf:'VF12+VF08',st:'partial',stText:'PARTIAL NOW',id:'xsrc'},
{num:'04',name:'SIGNAL INGESTION',vf:'VF02+VF04',st:'fork',stText:'FORK DIRECTION',id:'ingest'},
{num:'05',name:'ADS-B AIRCRAFT',vf:'VF01+VF03',st:'real',stText:'REAL NOW',id:'adsb'},
{num:'06',name:'AIS MARITIME',vf:'VF02+VF10',st:'partial',stText:'PARTIAL NOW',id:'ais'},
{num:'07',name:'SATELLITE',vf:'VF07+VF11',st:'real',stText:'REAL NOW',id:'sat'},
{num:'08',name:'MILITARY SIGNALS',vf:'VF16+VF12',st:'fork',stText:'FORK DIRECTION',id:'milsig'},
{num:'09',name:'AIRSPACE MONITORING',vf:'VF10+VF15',st:'real',stText:'REAL NOW',id:'airsp'},
{num:'10',name:'MAP-FIRST OPERATIONS',vf:'VF11+VF12',st:'real',stText:'REAL NOW',id:'mapops'},
{num:'11',name:'PREDICTION / SCENARIO',vf:'VF13+VF14',st:'real',stText:'REAL NOW',id:'pred'},
{num:'12',name:'STATS / INTELLIGENCE',vf:'VF05+VF16',st:'partial',stText:'PARTIAL NOW',id:'stats'},
{num:'13',name:'DATA WORKSPACE',vf:'VF06+VF03',st:'fork',stText:'FORK DIRECTION',id:'datawork'},
{num:'14',name:'REPORTS / BRIEFING',vf:'VF14+VF15',st:'partial',stText:'PARTIAL NOW',id:'reports'},
{num:'15',name:'MINI-SERVICES',vf:'VF05+VF04',st:'future',stText:'FUTURE INFRA',id:'minisvc'},
{num:'16',name:'STREAMING / WEBSOCKET',vf:'VF04+VF02',st:'future',stText:'FUTURE INFRA',id:'stream'},
];

const board=document.getElementById('board');
caps.forEach(c=>{
const div=document.createElement('div');div.className='tile';div.id='t-'+c.id;
div.innerHTML=`<div class="tile-num">${c.num}</div>
<div class="tile-label"><div class="row"><span class="name">${c.name}</span><span class="st ${c.st}">${c.stText}</span></div>
<div class="vf">${c.vf}</div></div>`;
board.appendChild(div);
});

// ═══════════════════════════════════════════════════
// 01. EVENT → SIGNAL → ENTITY — FORK DIRECTION
// Heavy circuit substrate. Three bus layers. IC pads.
// ═══════════════════════════════════════════════════
(function(){
const tile=document.getElementById('t-ese');
const c=document.createElement('canvas');tile.appendChild(c);
tile.appendChild(Object.assign(document.createElement('div'),{className:'scn'}));

function draw(){
const{W,H,x}=hd(c);if(!x)return;
rasterBase(x,W,H,.08);
const t=Date.now()/1000;

// Heavy PCB grid
x.strokeStyle=G2+'.04)';x.lineWidth=1;
for(let i=0;i<W;i+=10){x.beginPath();x.moveTo(i,0);x.lineTo(i,H);x.stroke()}
for(let i=0;i<H;i+=10){x.beginPath();x.moveTo(0,i);x.lineTo(W,i);x.stroke()}

// Three fat bus traces
const buses=[{y:H*.2,label:'SIG',n:7},{y:H*.5,label:'EVT',n:1},{y:H*.8,label:'ENT',n:4}];
buses.forEach((b,bi)=>{
// Fat trace background
x.fillStyle=G2+'.03)';x.fillRect(0,b.y-6,W,12);
// Trace lines
x.strokeStyle=G2+'.25)';x.lineWidth=3;
x.beginPath();x.moveTo(0,b.y);x.lineTo(W,b.y);x.stroke();
x.strokeStyle=G2+'.08)';x.lineWidth=1;
x.beginPath();x.moveTo(0,b.y-4);x.lineTo(W,b.y-4);x.stroke();
x.beginPath();x.moveTo(0,b.y+4);x.lineTo(W,b.y+4);x.stroke();
// Label stamped
x.fillStyle=G2+'.06)';x.fillRect(2,b.y-14,30,10);
x.font='bold 9px "Teko"';x.fillStyle=G2+'.5)';x.fillText(b.label+' ×'+b.n,4,b.y-6);
// Heavy pulses
for(let p=0;p<5;p++){
const px=((t*80+p*65+bi*50)%W);
x.fillStyle=G;x.fillRect(px-8,b.y-2.5,16,5);
x.fillStyle=G2+'.3)';x.fillRect(px-32,b.y-1.5,24,3);
x.fillStyle=G2+'.1)';x.fillRect(px-56,b.y-1,24,2);
}
});

// Vertical connectors with fat junction pads
[W*.18,W*.32,W*.48,W*.62,W*.78].forEach((vx,i)=>{
x.strokeStyle=G2+'.1)';x.lineWidth=1.5;
x.beginPath();x.moveTo(vx,H*.2);x.lineTo(vx,H*.5);x.stroke();
x.beginPath();x.moveTo(vx,H*.5);x.lineTo(vx,H*.8);x.stroke();
// Fat pads
[H*.2,H*.5,H*.8].forEach(py=>{
x.fillStyle=G2+'.6)';x.fillRect(vx-4,py-4,8,8);
x.fillStyle=BG;x.fillRect(vx-1.5,py-1.5,3,3);
});
// Downward pulses
const p1=((t*.5+i*.13)%1);
x.fillStyle=G;x.shadowColor=G;x.shadowBlur=8;
x.fillRect(vx-3,H*.2+(H*.3)*p1-3,6,6);
const p2=((t*.4+i*.17+.5)%1);
x.fillRect(vx-3,H*.5+(H*.3)*p2-3,6,6);
x.shadowBlur=0;
});

// IC blocks
const ics=[{px:W*.25,py:H*.35,label:'FUSE'},{px:W*.55,py:H*.35,label:'DEDUP'},{px:W*.4,py:H*.65,label:'GRAPH'},{px:W*.7,py:H*.65,label:'NORM'}];
ics.forEach(ic=>{
const w=52,h=26;
x.fillStyle=G2+'.06)';x.fillRect(ic.px-w/2,ic.py-h/2,w,h);
x.strokeStyle=G2+'.4)';x.lineWidth=2;x.strokeRect(ic.px-w/2,ic.py-h/2,w,h);
for(let p=0;p<5;p++){
x.fillStyle=G2+'.35)';
x.fillRect(ic.px-w/2-4,ic.py-h/2+3+p*4,3,2);
x.fillRect(ic.px+w/2+1,ic.py-h/2+3+p*4,3,2);
}
x.font='bold 8px "Teko"';x.fillStyle=G;x.textAlign='center';
x.fillText(ic.label,ic.px,ic.py+3);x.textAlign='left';
});

// Data overlay — dense, overlapping the visual
x.fillStyle='rgba(5,7,0,.7)';x.fillRect(W-100,54,94,H-80);
x.strokeStyle=G2+'.12)';x.strokeRect(W-100,54,94,H-80);
x.font='6px "Teko"';x.fillStyle=G2+'.4)';x.fillText('EVT RECORD',W-94,68);
const rows=['ID:EVT-03847','TYPE:MISSILE','SEV:CRITICAL','SIG:7 FUSED','ENT:4 LINKED','','SIG-001:GOV','SIG-002:SNSR','SIG-003:NEWS','SIG-004:OSINT','','ENT-A:IRGC','ENT-B:SHAHAB','ENT-C:TABRIZ'];
x.font='5px "Share Tech Mono"';
rows.forEach((r,i)=>{if(!r)return;const p=r.split(':');
x.fillStyle=G2+'.2)';x.fillText(p[0],W-94,80+i*13);
x.fillStyle=p[1]==='CRITICAL'?AMB:G2+'.45)';x.fillText(p[1]||'',W-58,80+i*13);
});

stamp(x,4,H-28,'SYS:ESE-ARCH');
requestAnimationFrame(draw);
}
draw();
})();

// ═══════════════════════════════════════════════════
// 02. CONFIDENCE EXPLANATION — PARTIAL NOW
// Binary raster field. Arc gauge. Factor bars. Dense.
// ═══════════════════════════════════════════════════
(function(){
const tile=document.getElementById('t-conf');
const c=document.createElement('canvas');tile.appendChild(c);
tile.appendChild(Object.assign(document.createElement('div'),{className:'scn'}));
tile.appendChild(Object.assign(document.createElement('div'),{className:'blm'}));

function draw(){
const{W,H,x}=hd(c);if(!x)return;
rasterBase(x,W,H,.12);
const t=Date.now()/1000;

// Dense binary character field
x.font='6px "Share Tech Mono"';
for(let r=0;r<H;r+=7)for(let c2=0;c2<W;c2+=6){
const v=Math.sin(r*.1+c2*.06+t*.4)>.5;
x.fillStyle=G2+(v?.1:.02)+')';
x.fillText(v?'1':'0',c2,r);
}

// Fat confidence arc
const cx=W*.3,cy=H*.42,r=75;
const confTarget=.84,conf=Math.min(confTarget,((t*.15)%1.3)*confTarget/.7);
// Track
x.strokeStyle=G2+'.08)';x.lineWidth=12;
x.beginPath();x.arc(cx,cy,r,-PI*.8,PI*.8);x.stroke();
// Fill
x.strokeStyle=G;x.lineWidth=12;
x.beginPath();x.arc(cx,cy,r,-PI*.8,-PI*.8+PI*1.6*conf);x.stroke();
// Inner ring
x.strokeStyle=G2+'.15)';x.lineWidth=1;
x.beginPath();x.arc(cx,cy,r-10,-PI*.8,PI*.8);x.stroke();
// Tick marks
for(let i=0;i<=20;i++){
const a=-PI*.8+PI*1.6*(i/20);
const i1=r+8,i2=r+(i%5===0?16:12);
x.strokeStyle=G2+(i%5===0?'.3)':'.1)');x.lineWidth=i%5===0?1.5:1;
x.beginPath();x.moveTo(cx+Math.cos(a)*i1,cy+Math.sin(a)*i1);x.lineTo(cx+Math.cos(a)*i2,cy+Math.sin(a)*i2);x.stroke();
}
// Bright tip
const tipA=-PI*.8+PI*1.6*conf;
x.fillStyle=G;x.shadowColor=G;x.shadowBlur=10;
x.beginPath();x.arc(cx+Math.cos(tipA)*r,cy+Math.sin(tipA)*r,5,0,TAU);x.fill();
x.shadowBlur=0;
// Score
x.font='bold 52px "Teko"';x.fillStyle=G;x.textAlign='center';
x.fillText(Math.floor(conf*100),cx,cy+16);
x.font='7px "Share Tech Mono"';x.fillStyle=G2+'.3)';
x.fillText('CONFIDENCE',cx,cy+30);x.textAlign='left';

// Factor bars — right side, fat
const factors=[['SRC RELI',78,0],['SRC INDEP',91,0],['CROSS AGR',85,0],['GEO CONF',72,0],['TEMPORAL',80,0],['ENTITY',65,0],['SENSOR',88,0],['AGE ADJ',70,0],['CONTRA',12,1]];
const fx=W*.56,fy=58,fh=16,fw=W*.4;
x.fillStyle=G2+'.04)';x.fillRect(fx-4,fy-12,fw+8,factors.length*fh+20);
x.strokeStyle=G2+'.08)';x.strokeRect(fx-4,fy-12,fw+8,factors.length*fh+20);
x.font='6px "Teko"';x.fillStyle=G2+'.4)';x.fillText('9-FACTOR BREAKDOWN',fx,fy-2);
factors.forEach(([label,val,warn],i)=>{
const y=fy+8+i*fh;
const fillDelay=i*.1;
const fillP=Math.min(1,Math.max(0,((t*.2)%1.4-fillDelay)*2));
x.font='5px "Share Tech Mono"';x.fillStyle=G2+'.3)';x.fillText(label,fx,y+8);
x.fillStyle=G2+'.04)';x.fillRect(fx+46,y+2,fw-62,7);
x.fillStyle=warn?'rgba(255,152,20,.55)':G2+'.5)';
x.fillRect(fx+46,y+2,(fw-62)*(val/100)*fillP,7);
x.fillStyle=G2+(fillP>.7?'.4)':'.1)');x.fillText(Math.floor(val*fillP),fx+fw-14,y+8);
});

// Source glyphs at bottom
x.font='8px "Share Tech Mono"';x.fillStyle=G2+'.15)';
['◆GOV:3','◈NEWS:4','◇SOCL:2','▣SNSR:1'].forEach((s,i)=>x.fillText(s,fx+i*36,H-34));

stamp(x,4,H-28,'SYS:CONF-9F');
requestAnimationFrame(draw);
}
draw();
})();

// ═══════════════════════════════════════════════════
// 03. CROSS-SOURCE VERIFICATION — PARTIAL NOW
// Telemetry islands. Glyph marks. Convergence.
// ═══════════════════════════════════════════════════
(function(){
const tile=document.getElementById('t-xsrc');
const c=document.createElement('canvas');tile.appendChild(c);
tile.appendChild(Object.assign(document.createElement('div'),{className:'scn'}));

function draw(){
const{W,H,x}=hd(c);if(!x)return;
rasterBase(x,W,H,.06);
const t=Date.now()/1000;

// Source family modules — chunky blocks
const families=[
{name:'GOVERNMENT',sigs:3,rel:.95,glyph:'◆'},
{name:'NEWS WIRE',sigs:4,rel:.82,glyph:'◈'},
{name:'SOCIAL/OSINT',sigs:2,rel:.55,glyph:'◇'},
{name:'SENSOR/SIGINT',sigs:1,rel:.98,glyph:'▣'},
{name:'COMMERCIAL',sigs:1,rel:.72,glyph:'▤'},
];

const mx=6,mw=W*.48,mh=H*.14;
families.forEach((f,i)=>{
const my=52+i*(mh+4);
// Chunky module frame
x.fillStyle=G2+'.025)';x.fillRect(mx,my,mw,mh);
x.strokeStyle=G2+'.12)';x.lineWidth=2;x.strokeRect(mx,my,mw,mh);
// Left thick accent bar
x.fillStyle=G2+(f.rel>.9?'.4)':f.rel>.7?'.2)':'.1)');
x.fillRect(mx,my,4,mh);
// Glyph mark
x.font='18px "Share Tech Mono"';x.fillStyle=G2+'.15)';
x.fillText(f.glyph,mw-14,my+mh-6);
// Family name
x.font='bold 9px "Teko"';x.fillStyle=G2+'.55)';x.fillText(f.name,mx+10,my+14);
// Signal count blocks (fat squares)
for(let s=0;s<f.sigs;s++){
x.fillStyle=G2+'.55)';x.fillRect(mx+10+s*14,my+20,10,10);
x.strokeStyle=G2+'.2)';x.strokeRect(mx+10+s*14,my+20,10,10);
}
// Reliability bar (thick)
x.fillStyle=G2+'.05)';x.fillRect(mx+10,my+mh-14,mw-24,6);
x.fillStyle=G2+'.45)';x.fillRect(mx+10,my+mh-14,(mw-24)*f.rel,6);
x.font='5px "Share Tech Mono"';x.fillStyle=G2+'.3)';
x.fillText((f.rel*100|0),mx+mw-16,my+mh-8);

// Connection trace to right panel
const cy2=my+mh/2;
x.strokeStyle=G2+'.08)';x.lineWidth=1.5;
x.beginPath();x.moveTo(mx+mw+2,cy2);x.lineTo(W*.58,cy2);x.stroke();
const pp=((t*.5+i*.18)%1);
x.fillStyle=G;x.fillRect(mx+mw+2+(W*.58-mx-mw-2)*pp-4,cy2-2.5,8,5);
});

// Corroboration panel — chunky hardware frame
const rx=W*.6,rw=W*.38;
x.fillStyle='rgba(5,7,0,.7)';x.fillRect(rx,48,rw,H-76);
x.strokeStyle=G2+'.15)';x.lineWidth=2;x.strokeRect(rx,48,rw,H-76);
x.fillStyle=G2+'.2)';x.fillRect(rx,48,rw,3);// top accent bar

x.font='bold 9px "Teko"';x.fillStyle=G2+'.5)';x.fillText('CORROBORATION',rx+8,66);
x.font='6px "Share Tech Mono"';x.fillStyle=G2+'.35)';
['AGREE:  4/5','XSRC:   0.82','CONTR:  0','INDEP:  0.91','CONV:   9MIN'].forEach((s,i)=>x.fillText(s,rx+8,84+i*14));

// Provenance bars
x.font='6px "Teko"';x.fillStyle=G2+'.35)';x.fillText('PROVENANCE',rx+8,164);
[{t:'14:32Z',src:'GOV',d:0},{t:'14:34Z',src:'NEWS',d:2},{t:'14:35Z',src:'SNSR',d:3},{t:'14:38Z',src:'SOCL',d:6},{t:'14:41Z',src:'COMM',d:9}].forEach((ev,i)=>{
const ey=178+i*16;
x.fillStyle=G2+'.04)';x.fillRect(rx+8,ey,rw-16,10);
x.fillStyle=G2+(.45-.05*i).toFixed(2)+')';x.fillRect(rx+8+(ev.d/9)*50,ey,8,10);
x.font='5px "Share Tech Mono"';x.fillStyle=G2+'.25)';
x.fillText(ev.t+' '+ev.src,rx+12,ey+7);
});

// Verified badge — pulsing
const vp=Math.sin(t*2)*.12+.2;

case'wave':

for(let j=0;j<cW;j++){const v=Math.sin(j*.12+t*4)*cH*.3+cH/2;j===0?xx.moveTo(j,v):xx.lineTo(j,v)}xx.stroke();
xx.strokeStyle=G2+'.25)';xx.lineWidth=1;xx.beginPath();
for(let j=0;j<cW;j++){const v=Math.sin(j*.25+t*6)*cH*.18+cH/2;j===0?xx.moveTo(j,v):xx.lineTo(j,v)}xx.stroke();break;
case'pulse':
for(let j=0;j<cW;j+=2){const shift=(t*60)%20;const h=((j+shift)%20)<4?cH*.65:cH*.08;
xx.fillStyle=G2+(.15+h/cH*.5).toFixed(2)+')';xx.fillRect(j,cH/2-h/2,2,h);}break;
case'dots':
for(let r=3;r<cH;r+=6)for(let c=3;c<cW;c+=6){const v=Math.sin(t*2+r*.15+c*.1)*.5+.5;
xx.fillStyle=G2+(v*.6).toFixed(2)+')';xx.fillRect(c-1,r-1,2,2);}break;
case'spectrum':
for(let c=0;c<cW;c+=2){const h=(Math.sin(c*.15+t*3)*.5+.5)*cH*.85;const isH=Math.abs(c-cW*.4)<12;
xx.fillStyle=isH?'rgba(255,152,20,'+(h/cH*.6).toFixed(2)+')':G2+(.1+h/cH*.4).toFixed(2)+')';
xx.fillRect(c,cH-h,2,h);}break;
case'bars':
for(let c=0;c<cW;c+=4){const h=(.2+Math.random()*.5)*cH;const thr=c>cW*.55&&c<cW*.75;
xx.fillStyle=thr?'rgba(255,152,20,.5)':G2+'.2)';xx.fillRect(c,cH-h,3,h);}break;
case'noise':
for(let j=0;j<500;j++){xx.fillStyle=G2+(Math.random()*.35).toFixed(2)+')';
xx.fillRect(Math.random()*cW,Math.random()*cH,2,2);}break;
case'binary':
xx.font='4px "Share Tech Mono"';
for(let r=0;r<cH;r+=5)for(let c=0;c<cW;c+=4){const on=((r*7+c*13+Math.floor(t*3))%5)>2;
xx.fillStyle=on?G2+'.5)':G2+'.03)';xx.fillText(on?'1':'0',c,r);}break;
case'status':
for(let r=0;r<4;r++)for(let c=0;c<4;c++){const si=(r*4+c+Math.floor(t))%5;
const cols=[G2+'.5)',G2+'.08)',G2+'.5)','rgba(255,152,20,.4)',G2+'.25)'];
xx.fillStyle=cols[si];xx.fillRect(c*(cW/4)+1,r*(cH/4)+1,cW/4-2,cH/4-2);}break;
}
requestAnimationFrame(anim);
});
});
})();

// Hex mesh

for(let row=-1;row<H/hexH+1;row++){
for(let col=-1;col<W/(hexR*3)+1;col++){

const isR=hx>W*.12&&hx<W*.42&&hy>H*.15&&hy<H*.65;
const isD=hx>W*.22&&hx<W*.38&&hy>H*.25&&hy<H*.55;
x.beginPath();for(let i=0;i<6;i++){const a=PI/6+i*PI/3;i===0?x.moveTo(hx+Math.cos(a)*hexR*.87,hy+Math.sin(a)*hexR*.87):x.lineTo(hx+Math.cos(a)*hexR*.87,hy+Math.sin(a)*hexR*.87)}x.closePath();
const dp=isD?Math.sin(t*2)*.03+.06:.06;
if(isD){x.fillStyle='rgba(255,152,20,'+dp.toFixed(3)+')';x.fill();x.strokeStyle='rgba(255,152,20,.2)'}
else if(isR){x.fillStyle=G2+'.015)';x.fill();x.strokeStyle=G2+'.07)'}
else{x.strokeStyle=G2+'.035)'}
x.lineWidth=.5;x.stroke();
}}

// Scan sweep
const sweepX=((t*35)%(W*.52));
x.fillStyle=G2+'.04)';x.fillRect(sweepX-10,0,20,H);

});

// Zone labels
x.font='bold 8px "Teko"';x.fillStyle='rgba(255,152,20,.45)';x.fillText('DANGER',W*.25,H*.3);

// Critical NOTAM amber
const critF=Math.sin(t*3)>.3?1:.55;

x.fillStyle=BG;x.font='bold 9px "Teko"';x.fillText('⚠ NOTAM A0847/26',nx+8,72);

x.fillText('OMAE FIR — FL200-UNL',nx+8,92);
x.fillText('DANGER AREA ACTIVE',nx+8,104);

// 10. MAP-FIRST OPERATIONS — REAL NOW
// Globe. Incidents. Radar sweep. Telemetry islands.
// ═══════════════════════════════════════════════════
(function(){
const tile=document.getElementById('t-mapops');
const c=document.createElement('canvas');tile.appendChild(c);

function draw(){
const{W,H,x}=hd(c);if(!x)return;
x.fillStyle='#020400';x.fillRect(0,0,W,H);
const t=Date.now()/1000;
const gcx=W*.36,gcy=H*.5,R=Math.min(W*.3,H*.38);

// Globe
x.strokeStyle=G2+'.12)';x.lineWidth=1;
x.beginPath();x.arc(gcx,gcy,R,0,TAU);x.stroke();
// Grid
x.strokeStyle=G2+'.04)';x.lineWidth=.5;
for(let lat=-60;lat<=60;lat+=20){
const r2=R*Math.cos(lat*PI/180),y=gcy-R*Math.sin(lat*PI/180);
x.beginPath();x.ellipse(gcx,y,r2,r2*.12,0,0,TAU);x.stroke();
}
for(let lon=0;lon<180;lon+=30){
x.save();x.translate(gcx,gcy);x.rotate((lon+t*12)*PI/180);
x.beginPath();x.ellipse(0,0,R*.12,R,0,0,TAU);x.stroke();
x.restore();
}
// Land dots
const step=4.5;
for(let dy=-R;dy<=R;dy+=step)for(let dx=-R;dx<=R;dx+=step){
if(dx*dx+dy*dy>R*R)continue;
const sq=Math.max(0,R*R-dx*dx-dy*dy);
const lon=(Math.atan2(dx,Math.sqrt(sq))*180/PI+t*12)%360;
const lat=Math.asin(Math.max(-1,Math.min(1,dy/R)))*180/PI;
const v=Math.sin(lon*.05)*Math.cos(lat*.08)+Math.sin(lon*.03+lat*.04)*.5;
if(v>.15&&Math.abs(lat)<70){x.fillStyle=G2+(0.1+v*.15).toFixed(3)+')';x.fillRect(gcx+dx-1,gcy+dy-1,2,2);}
}
// Radar sweep
x.save();x.translate(gcx,gcy);x.rotate(t*.8);
try{const grad=x.createConicGradient(0,0,0);grad.addColorStop(0,G2+'.15)');grad.addColorStop(.08,'transparent');grad.addColorStop(1,'transparent');
x.fillStyle=grad;x.beginPath();x.arc(0,0,R,0,TAU);x.fill();}catch(e){}
x.strokeStyle=G2+'.3)';x.lineWidth=1;x.beginPath();x.moveTo(0,0);x.lineTo(R,0);x.stroke();
x.restore();
// Incident markers
[{ix:gcx+R*.3,iy:gcy-R*.1,s:'c'},{ix:gcx-R*.2,iy:gcy+R*.15,s:'h'},{ix:gcx+R*.1,iy:gcy+R*.3,s:'m'},{ix:gcx-R*.35,iy:gcy-R*.2,s:'h'},{ix:gcx+R*.25,iy:gcy-R*.3,s:'c'}].forEach(inc=>{
x.fillStyle=inc.s==='c'?'rgba(255,152,20,.8)':inc.s==='h'?'rgba(255,152,20,.45)':G2+'.4)';
x.fillRect(inc.ix-2.5,inc.iy-2.5,5,5);
if(inc.s==='c'){x.strokeStyle='rgba(255,152,20,.3)';x.lineWidth=1;x.beginPath();x.arc(inc.ix,inc.iy,8+Math.sin(t*3)*3,0,TAU);x.stroke()}
});
// Rim
x.strokeStyle=G2+'.25)';x.lineWidth=2;x.beginPath();x.arc(gcx,gcy,R,0,TAU);x.stroke();

// Telemetry islands
const ix=W*.7,iw=W*.28;
x.fillStyle='rgba(5,7,0,.8)';x.fillRect(ix,48,iw,H-76);
x.strokeStyle=G2+'.08)';x.lineWidth=1.5;x.strokeRect(ix,48,iw,H-76);
x.fillStyle=G2+'.2)';x.fillRect(ix,48,iw,3);
const metrics=[{l:'EVENTS',b:224},{l:'ACTIVE',b:47},{l:'CRIT',b:8,w:1},{l:'AIRCRAFT',b:12},{l:'VESSELS',b:31},{l:'HOTSPOT',b:6,w:1},{l:'COUNTRY',b:14},{l:'SOURCES',b:5}];
const activeM=Math.floor(t*1.5)%metrics.length;
metrics.forEach((m,i)=>{
const my=56+i*((H-84)/8),mh=(H-84)/8-2;
const isA=i===activeM;
x.fillStyle=isA?G2+'.04)':G2+'.015)';x.fillRect(ix+3,my,iw-6,mh);
x.strokeStyle=isA?G2+'.15)':G2+'.05)';x.strokeRect(ix+3,my,iw-6,mh);
x.font='4px "Share Tech Mono"';x.fillStyle=G2+'.25)';x.fillText(m.l,ix+6,my+10);
const jit=isA?Math.floor(Math.sin(t*6)*2):0;
x.font='bold 16px "Teko"';x.fillStyle=m.w?AMB:G;x.fillText(m.b+jit,ix+6,my+mh-3);
});

x.font='6px "Share Tech Mono"';x.fillStyle=G2+'.25)';x.fillText('GULF THEATRE',6,18);
stamp(x,4,H-28,'SYS:MAP-OPS');
requestAnimationFrame(draw);
}
draw();
})();

// Dark die area

x.fillRect(s.sx-cw2/2+cw2*.15,s.sy-ch2/2+ch2*.2,cw2*.7,ch2*.6);
// Service label
x.font='600 7px "Teko"';x.fillStyle=isP?G:G2+'.6)';
x.textAlign='center';x.fillText(s.l,s.sx,s.sy+2);x.textAlign='left';
// Status dot
const dotOn=isP?(Math.sin(t*8)>0):isA;
x.fillStyle=dotOn?G:G2+'.1)';x.fillRect(s.sx+cw2/2-6,s.sy-ch2/2+2,4,4);

// IC pins
x.strokeStyle=G2+'.15)';x.lineWidth=.5;
for(let p=0;p<3;p++){
const py=s.sy-ch2/2+ch2*.2+p*(ch2*.3);
x.beginPath();x.moveTo(s.sx-cw2/2-W*.02,py);x.lineTo(s.sx-cw2/2,py);x.stroke();
x.fillStyle=G2+'.3)';x.fillRect(s.sx-cw2/2-W*.02-1,py-1,3,3);
x.beginPath();x.moveTo(s.sx+cw2/2,py);x.lineTo(s.sx+cw2/2+W*.02,py);x.stroke();
x.fillRect(s.sx+cw2/2+W*.02-1,py-1,3,3);
}

// Timestamp annotation
x.font='500 9px "Teko"';x.fillStyle=G2+'.4)';
const ts=['5:40','11:04','12:00','13:54','8:22','16:05'][i];
x.fillText(ts,s.sx+cw2/2+W*.03,s.sy+3);
});

// Horizontal traces to buses
svcs.forEach((s)=>{
const nearBus=s.sx<W*.5?bus1X:bus2X;
x.strokeStyle=G2+'.06)';x.lineWidth=1;
x.beginPath();
if(s.sx<W*.5){x.moveTo(s.sx+W*.06,s.sy);x.lineTo(nearBus,s.sy)}
else{x.moveTo(nearBus+busW,s.sy);x.lineTo(s.sx-W*.06,s.sy)}
x.stroke();
});

// Test points
x.fillStyle=G2+'.5)';
[[W*.15,H*.12],[W*.85,H*.12],[W*.5,H*.5],[W*.15,H*.9],[W*.85,H*.9],[W*.5,H*.15]].forEach(([dx,dy])=>{
x.fillRect(dx,dy,3,3);
});

// Circle alignment mark
x.strokeStyle=G2+'.4)';x.lineWidth=1.2;
x.beginPath();x.arc(W*.5,H*.06+8,6,0,TAU);x.stroke();

// Bus label
x.font='5px "Share Tech Mono"';x.fillStyle=G2+'.15)';
x.save();x.translate(bus1X-5,H*.5);x.rotate(-PI/2);x.fillText('SERVICE BUS A',0,0);x.restore();
x.save();x.translate(bus2X+busW+8,H*.5);x.rotate(-PI/2);x.fillText('SERVICE BUS B',0,0);x.restore();
x.fillStyle=G2+'.25)';
x.fillText((7+Math.floor(Math.sin(t)*2))+' ops/s',W*.41-18,H*.92);

stamp(x,4,H-28,'SYS:MICROSVC');
requestAnimationFrame(draw);
}
document.fonts.ready.then(draw);
})();

// ═══════════════════════════════════════════════════
// 16. STREAMING / WEBSOCKET — FUTURE INFRA
// Horizontal bus channels. Packets. Phosphor.
// ═══════════════════════════════════════════════════
(function(){
const tile=document.getElementById('t-stream');
const c=document.createElement('canvas');tile.appendChild(c);
tile.appendChild(Object.assign(document.createElement('div'),{className:'scn hv'}));
tile.appendChild(Object.assign(document.createElement('div'),{className:'blm'}));

function draw(){
const{W,H,x}=hd(c);if(!x)return;
rasterBase(x,W,H,.08);
const t=Date.now()/1000;

const chs=[
{l:'WS:INCIDENTS',r:'4.2/s',on:true},{l:'WS:PRICES',r:'1.0/s',on:true},
{l:'WS:ADSB',r:'12.8/s',on:true},{l:'WS:NOTAMS',r:'0.3/s',on:true},
{l:'WS:AIS',r:'---',on:false},{l:'WS:SIGINT',r:'---',on:false},
{l:'WS:ALERTS',r:'0.1/s',on:true},{l:'WS:HEALTH',r:'1.0/s',on:true},
];

const chH=(H-84)/chs.length;
chs.forEach((ch,i)=>{
const cy=56+i*chH+chH/2;
// Channel trace — fat
x.fillStyle=ch.on?G2+'.02)':G2+'.005)';x.fillRect(80,cy-3,W-88,6);
x.strokeStyle=ch.on?G2+'.1)':G2+'.025)';x.lineWidth=1.5;
x.beginPath();x.moveTo(80,cy);x.lineTo(W-8,cy);x.stroke();
// Label
x.font='5px "Share Tech Mono"';x.fillStyle=ch.on?G2+'.45)':G2+'.12)';
x.fillText(ch.l,4,cy+2);
// Rate
x.fillStyle=ch.on?G2+'.3)':G2+'.1)';x.fillText(ch.r,W-38,cy+2);
if(ch.on){
// Fat streaming packets
for(let p=0;p<5;p++){
const spd=55+Math.sin(i*1.3)*18;
const px=((t*spd+p*55+i*35)%(W-88))+80;
const pw=8+Math.random()*18;
x.fillStyle=G2+'.5)';x.fillRect(px,cy-3,pw,6);
x.fillStyle=G2+'.15)';x.fillRect(px-pw,cy-1.5,pw,3);
}
x.fillStyle=G;x.fillRect(74,cy-3,5,6);
}else{
x.fillStyle=G2+'.04)';x.fillRect(74,cy-3,5,6);
x.strokeStyle=G2+'.08)';x.lineWidth=.5;x.strokeRect(74,cy-3,5,6);
}
});

// Header
x.font='bold 8px "Teko"';x.fillStyle=G2+'.4)';x.fillText('STREAMING ARCHITECTURE',4,50);
x.font='5px "Share Tech Mono"';x.fillStyle=G2+'.2)';x.fillText('6/8 CH ACTIVE',W-80,50);

// Throughput bar
x.fillStyle='rgba(5,7,0,.8)';x.fillRect(4,H-32,W-8,18);
x.strokeStyle=G2+'.08)';x.strokeRect(4,H-32,W-8,18);
const tp=((t%5)/5);
x.fillStyle=G2+'.1)';x.fillRect(8,H-28,W-16,10);
x.fillStyle=G;x.fillRect(8,H-28,(W-16)*tp,10);
x.font='5px "Share Tech Mono"';x.fillStyle=G2+'.4)';
x.fillText('THROUGHPUT:'+(19.4+Math.sin(t)*3).toFixed(1)+' msg/s',12,H-20);

stamp(x,W-80,H-42,'SYS:WS-STREAM');
requestAnimationFrame(draw);
}
draw();
})();


</script>
